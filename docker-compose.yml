services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pqr}
      POSTGRES_USER: ${POSTGRES_USER:-pqr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pqr}
    volumes:
      - pqr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pqr}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pqr_db_data:
